<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пополнение баланса</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Пополнение баланса</h1>
        <form id="topupForm">
            <div class="form-group">
                <label>Имя пользователя:</label>
                <input type="text" id="username" value="{{ username }}" readonly>
            </div>
            <div class="form-group">
                <label>Сумма пополнения (RUB):</label>
                <input type="number" id="amount" min="1" required placeholder="Введите сумму">
            </div>
            <button type="submit">Подтвердить</button>
        </form>
        <a href="/" class="back-link">← Вернуться на главную</a>
    </div>

    <script>
        document.getElementById('topupForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const amount = document.getElementById('amount').value;

            // Отправляем запрос на API
            const response = await fetch(`/user/pl/balance?user_name=${username}&bl=${amount}`);
            const result = await response.json();

            if (result.status === 'success') {
                alert(`✅ Заявка создана!\nСумма: ${amount} RUB\nРеквизиты отправлены в консоль`);
                window.location.href = '/';
            } else {
                alert(`❌ Ошибка: ${result.message}`);
            }
        };
    </script>
</body>
</html>
